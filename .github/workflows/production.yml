name: Docker CI/CD for .NET 8 API

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 3. Cache NuGet (tăng tốc build)
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # 4. Restore dependencies
      - name: Restore
        run: dotnet restore

      # 5. Build
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # 6. Test
      - name: Run Tests
        run: dotnet test --no-build --verbosity normal

  # ============================================
  #  DEPLOY — để trống theo yêu cầu
  # ============================================
  deploy:
    name: Deploy to production server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Placeholder for future deployment
        run: echo "🟨 Deployment step is empty. Add SSH/Kubernetes/Cloud Run/Azure script here."
